<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invite</title>

<style>

body{
  margin:0;
  font-family:sans-serif;
  overflow-x:hidden;
  background:#fff;
}

/* PAGE 1 */
#landing{
  position:fixed;
  inset:0;
}

#landing video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.3);
}

button{
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 40px;
  border:none;
  border-radius:30px;
  font-size:16px;
  background:#fff;
}

/* MAIN PAGE */
#main{
  display:none;
}

/* HEADER IMAGE */
.header-img{
  width:100%;
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.header-img img{
  width:80%;
  max-width:400px;
}

/* CAROUSEL */
.carousel-container{
  overflow:hidden;
  margin-top:30px;
}

.carousel-track{
  display:flex;
  width:max-content;
  animation:scroll 20s linear infinite;
}

.carousel-track img{
  width:250px;
  height:250px;
  object-fit:cover;
  margin-right:10px;
  border-radius:10px;
}

@keyframes scroll{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}

/* RSVP */
.rsvp{
  margin-top:40px;
  padding:20px;
  text-align:center;
}

input, button.rsvp-btn{
  width:80%;
  max-width:300px;
  padding:10px;
  margin-top:10px;
}

button.rsvp-btn{
  background:black;
  color:white;
  border:none;
}

</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
  <video autoplay muted loop playsinline>
    <source src="intro.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>
  <button onclick="openPage()">Buka Jemputan</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- TAJUK -->
  <div class="header-img">
    <img src="tajuk.png" alt="tajuk">
  </div>

  <!-- CAROUSEL -->
  <div class="carousel-container">
    <div class="carousel-track">
      <img src="g1.jpg">
      <img src="g2.jpg">
      <img src="g3.jpg">
      <img src="g4.jpg">
      <img src="g5.jpg">

      <!-- duplicate for seamless loop -->
      <img src="g1.jpg">
      <img src="g2.jpg">
      <img src="g3.jpg">
      <img src="g4.jpg">
      <img src="g5.jpg">
    </div>
  </div>

  <!-- RSVP -->
  <div class="rsvp">
    <h2>RSVP</h2>

    <form id="rsvpForm">
      <input type="text" name="name" placeholder="Nama" required>
      <input type="number" name="pax" placeholder="Jumlah Pax" required>
      <button class="rsvp-btn" type="submit">Hantar</button>
    </form>
  </div>

</div>

<script>

function openPage(){
  document.getElementById("landing").style.display = "none";
  document.getElementById("main").style.display = "block";
}

/* GOOGLE SHEET FORM */
const scriptURL = "https://script.google.com/macros/s/AKfycbyKR2XfnEc6v6Z7h3QhYHBAVSfw6ozpCFDYFgbi90HhNjfN1eZPgFCcMV0Gs1XkKFRMFA/exec";

document.getElementById("rsvpForm").addEventListener("submit", e=>{
  e.preventDefault();

  fetch(scriptURL, {
    method: "POST",
    body: new FormData(document.getElementById("rsvpForm"))
  })
  .then(response => alert("Terima kasih! RSVP diterima"))
  .catch(error => alert("Error"));
});

</script>

</body>
</html>
