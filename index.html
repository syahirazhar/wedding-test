<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LANDING -->
<div id="landing">
  <video autoplay muted loop playsinline>
    <source src="intro.mp4">
  </video>

  <div class="overlay"></div>

  <button onclick="openPage()">Open Invitation</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- HEADER -->
  <section class="hero">
    <img src="tajuk.png" class="title-img">
  </section>

  <!-- COUNTDOWN -->
  <section class="countdown">
    <h2>Until We Say "I Do"</h2>

    <p class="date-text">12 December 2026</p>

    <div class="count-box">
      <div class="box">
        <div id="days">0</div>
        <small>Days</small>
      </div>

      <div class="box">
        <div id="hours">0</div>
        <small>Hours</small>
      </div>

      <div class="box">
        <div id="minutes">0</div>
        <small>Minutes</small>
      </div>

      <div class="box">
        <div id="seconds">0</div>
        <small>Seconds</small>
      </div>
    </div>
  </section>

  <!-- GALLERY -->
  <section class="gallery">
    <div class="carousel">
      <div class="track">
        <img src="g1.jpg">
        <img src="g2.jpg">
        <img src="g3.jpg">
        <img src="g4.jpg">
        <img src="g5.jpg">

        <img src="g1.jpg">
        <img src="g2.jpg">
        <img src="g3.jpg">
        <img src="g4.jpg">
        <img src="g5.jpg">
      </div>
    </div>
  </section>

  <!-- LOCATION -->
  <section class="location">

    <h2>Venue</h2>

    <p>
      Jalan Kontraktor U1/14<br>
      Hicom-Glenmarie Industrial Park<br>
      40150 Shah Alam, Selangor
    </p>

    <iframe
      class="map"
      src="https://www.google.com/maps?q=Jalan%20Kontraktor%20U1/14%20Hicom%20Glenmarie%20Shah%20Alam&output=embed">
    </iframe>

    <a class="waze-btn"
       href="https://waze.com/ul?q=Jalan%20Kontraktor%20U1/14%20Hicom-Glenmarie%20Industrial%20Park%2040150%20Shah%20Alam"
       target="_blank">
       Open in Waze
    </a>

  </section>

  <!-- RSVP -->
  <section class="rsvp">

    <h2>RSVP</h2>

    <p class="subtitle">
      Kindly let us know your attendance
    </p>

    <form id="rsvpForm">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="number" name="pax" placeholder="Number of Guests" required>
      <button type="submit" id="submitBtn">Send RSVP</button>
    </form>

    <p id="msg"></p>

  </section>

  <div class="footer">
    Made with care for a special day
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
