<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LANDING (TAP ANYWHERE) -->
<div id="landing" onclick="openPage()">
  <video autoplay muted loop playsinline>
    <source src="intro.mp4">
  </video>

  <div class="overlay"></div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- HERO -->
  <section class="hero">
    <img src="tajuk.png" class="title-img">
  </section>

  <!-- COUNTDOWN -->
  <section class="countdown">
    <h2>Until We Say "I Do"</h2>
    <p class="date-text">12 December 2026</p>

    <div class="count-box">
      <div class="box">
        <div id="days">0</div>
        <small>Days</small>
      </div>

      <div class="box">
        <div id="hours">0</div>
        <small>Hours</small>
      </div>

      <div class="box">
        <div id="minutes">0</div>
        <small>Minutes</small>
      </div>

      <div class="box">
        <div id="seconds">0</div>
        <small>Seconds</small>
      </div>
    </div>
  </section>

  <!-- GALLERY -->
  <section class="gallery">
    <div class="carousel">
      <div class="track">
        <img src="g1.jpg">
        <img src="g2.jpg">
        <img src="g3.jpg">
        <img src="g4.jpg">
        <img src="g5.jpg">

        <img src="g1.jpg">
        <img src="g2.jpg">
        <img src="g3.jpg">
        <img src="g4.jpg">
        <img src="g5.jpg">
      </div>
    </div>
  </section>

  <!-- LOCATION -->
  <section class="location">

    <h2>Venue</h2>

    <p>KAMALINDA SIGNATURE WEDDING</p>

    <iframe
      class="map"
      src="https://www.google.com/maps?q=Kamalinda%20Signature%20Wedding&output=embed">
    </iframe>

    <div class="map-buttons">

      <a class="map-btn google"
         href="https://www.google.com/maps/search/?api=1&query=Kamalinda+Signature+Wedding"
         target="_blank">
         Google Maps
      </a>

      <a class="map-btn waze"
         href="https://waze.com/ul?q=Kamalinda+Signature+Wedding"
         target="_blank">
         Waze
      </a>

    </div>

  </section>

  <!-- CALENDAR -->
  <section class="calendar">

    <h2>Add to Calendar</h2>
    <p>Save our special day</p>

    <div class="calendar-buttons">

      <a class="cal-btn"
         href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Wedding%20Sofea%20%26%20Syahir&dates=20261212T120000/20261212T160000&details=Wedding%20Invitation&location=Kamalinda%20Signature%20Wedding"
         target="_blank">
         Google Calendar
      </a>

      <a class="cal-btn"
         href="data:text/calendar;charset=utf8,BEGIN:VCALENDAR%0AVERSION:2.0%0ABEGIN:VEVENT%0ADTSTART:20261212T120000%0ADTEND:20261212T160000%0ASUMMARY:Wedding Sofea & Syahir%0ALOCATION:Kamalinda Signature Wedding%0AEND:VEVENT%0AEND:VCALENDAR"
         download="wedding.ics">
         Apple Calendar
      </a>

    </div>

  </section>

  <!-- RSVP -->
  <section class="rsvp">

    <h2>RSVP</h2>

    <p class="subtitle">Kindly let us know your attendance</p>

    <form id="rsvpForm">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="number" name="pax" placeholder="Number of Guests" required>
      <button type="submit" id="submitBtn">Send RSVP</button>
    </form>

    <p id="msg"></p>

  </section>

  <!-- FOOTER -->
  <div class="footer">
    Made with care for a special day
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
