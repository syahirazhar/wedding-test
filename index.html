<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    overflow:hidden;
    background:#000;
}

/* PAGE 1 */
#landing{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

#landing video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.25);
}

.open-btn{
    position:absolute;
    bottom:70px;
    padding:16px 45px;
    border:none;
    border-radius:50px;
    background:white;
    color:black;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.open-btn:hover{
    transform:scale(1.05);
}

/* PAGE 2 */

#page2{
    position:fixed;
    inset:0;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    opacity:0;
    visibility:hidden;
    transition:1s;
}

#page2.show{
    opacity:1;
    visibility:visible;
}

h1{
    font-size:48px;
    color:#444;
}

p{
    margin-top:15px;
    font-size:22px;
    color:#777;
}
</style>
</head>

<body>

<div id="landing">

<video autoplay muted playsinline loop>
    <source src="intro.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<button class="open-btn" onclick="openInvitation()">
Buka Jemputan
</button>

</div>

<div id="page2">

<h1>Anda Dijemput</h1>

<p>Ke Majlis Perkahwinan Kami</p>

</div>

<script>

function openInvitation(){

document.getElementById("page2").classList.add("show");

}

</script>

</body>
</html>
