<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invite</title>

<style>

body{
  margin:0;
  font-family:sans-serif;
  overflow-x:hidden;
  background:#fff;
}

/* LANDING */
#landing{
  position:fixed;
  inset:0;
  transition:opacity 0.6s ease;
}

#landing video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

button{
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 40px;
  border:none;
  border-radius:30px;
  font-size:16px;
  background:#fff;
  cursor:pointer;
}

/* MAIN */
#main{
  display:none;
  opacity:0;
  transform:translateY(20px);
  transition:all 0.6s ease;
}

/* HEADER */
.header-img{
  width:100%;
  display:flex;
  justify-content:center;
  margin-top:25px;
}

.header-img img{
  width:80%;
  max-width:380px;
}

/* CAROUSEL */
.carousel-wrapper{
  overflow:hidden;
  margin-top:30px;
}

.carousel-track{
  display:flex;
  width:max-content;
  animation:scroll 18s linear infinite;
}

.carousel-track img{
  width:220px;
  height:220px;
  object-fit:cover;
  margin-right:10px;
  border-radius:12px;
}

@keyframes scroll{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}

/* RSVP */
.rsvp{
  margin-top:50px;
  padding:20px;
  text-align:center;
}

.rsvp input{
  width:85%;
  max-width:320px;
  padding:12px;
  margin-top:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

.rsvp button{
  position:static;
  transform:none;
  margin-top:15px;
  width:85%;
  max-width:320px;
  background:black;
  color:white;
  border-radius:8px;
}

#msg{
  margin-top:15px;
  font-size:14px;
}

</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
  <video autoplay muted loop playsinline>
    <source src="intro.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>
  <button onclick="openPage()">Buka Jemputan</button>
</div>

<!-- MAIN -->
<div id="main">

  <div class="header-img">
    <img src="tajuk.png">
  </div>

  <!-- CAROUSEL -->
  <div class="carousel-wrapper">
    <div class="carousel-track">
      <img src="g1.jpg">
      <img src="g2.jpg">
      <img src="g3.jpg">
      <img src="g4.jpg">
      <img src="g5.jpg">

      <img src="g1.jpg">
      <img src="g2.jpg">
      <img src="g3.jpg">
      <img src="g4.jpg">
      <img src="g5.jpg">
    </div>
  </div>

  <!-- RSVP -->
  <div class="rsvp">
    <h2>RSVP</h2>

    <form id="rsvpForm">
      <input type="text" name="name" placeholder="Nama" required>
      <input type="number" name="pax" placeholder="Jumlah Pax" required>
      <button type="submit" id="submitBtn">Hantar</button>
    </form>

    <div id="msg"></div>
  </div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbw9h3Jtk0QOVi0L5zBPz1wb0TU5KG-nPvxrHxyKsHAgg0inrqLu0Yj1z6gbnbjbeahuWQ/exec";

/* OPEN PAGE */
function openPage(){
  document.getElementById("landing").style.opacity = "0";

  setTimeout(()=>{
    document.getElementById("landing").style.display = "none";
    document.getElementById("main").style.display = "block";

    setTimeout(()=>{
      document.getElementById("main").style.opacity = "1";
      document.getElementById("main").style.transform = "translateY(0)";
    },50);

  },600);
}

/* RSVP */
document.getElementById("rsvpForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  const msg = document.getElementById("msg");

  btn.disabled = true;
  btn.innerText = "Menghantar...";

  msg.innerText = "";

  try{
    const res = await fetch(scriptURL, {
      method: "POST",
      body: new FormData(e.target)
    });

    const text = await res.text();
    console.log(text);

    msg.innerText = "Terima kasih! RSVP berjaya dihantar.";
    msg.style.color = "green";

    e.target.reset();

  }catch(err){
    console.log(err);

    msg.innerText = "Gagal hantar. Cuba lagi.";
    msg.style.color = "red";
  }

  btn.disabled = false;
  btn.innerText = "Hantar";
});

</script>

</body>
</html>
